services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: statuspage
      POSTGRES_PASSWORD: statuspage
      POSTGRES_DB: statuspage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statuspage -d statuspage"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://statuspage:statuspage@db:5432/statuspage?schema=public
      NODE_ENV: development
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run start"

volumes:
  postgres_data:
