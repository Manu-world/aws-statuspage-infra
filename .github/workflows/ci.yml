name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App build + Prisma smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: statuspage
          POSTGRES_PASSWORD: statuspage
          POSTGRES_DB: statuspage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U statuspage -d statuspage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: app

    env:
      DATABASE_URL: postgresql://statuspage:statuspage@localhost:5432/statuspage?schema=public
      SEED_ADMIN_EMAIL: ci-admin@example.com
      SEED_ADMIN_PASSWORD: CiPasswordChangeMe1!
      SEED_DEMO_DATA: "true"
      JWT_SECRET: ci-jwt-secret-not-for-production
      COOKIE_SECURE: "false"
      NODE_ENV: test
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Typecheck / lint
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Migrate + seed smoke test
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start app and smoke auth + write path
        run: |
          node dist/index.js &
          APP_PID=$!
          cleanup() { kill $APP_PID 2>/dev/null || true; }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/health; then
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Health check failed"
              exit 1
            fi
          done

          curl -sf -c /tmp/cj -H 'Content-Type: application/json' \
            -d '{"email":"ci-admin@example.com","password":"CiPasswordChangeMe1!"}' \
            http://127.0.0.1:3000/api/auth/login >/tmp/login.json
          cat /tmp/login.json

          curl -sf -b /tmp/cj -H 'Content-Type: application/json' \
            -d '{"name":"CI Probe Service","status":"operational"}' \
            http://127.0.0.1:3000/api/services >/tmp/svc.json
          cat /tmp/svc.json

          curl -sf http://127.0.0.1:3000/api/services | grep -q "CI Probe Service"
          echo "Auth + write smoke OK"

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
